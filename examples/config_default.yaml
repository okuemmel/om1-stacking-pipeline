# ═══════════════════════════════════════════════════════════
# OM-1 Makro-Stacking Pipeline - Standard-Konfiguration
# ═══════════════════════════════════════════════════════════
#
# Diese Config wird beim ersten Start automatisch nach
# ~/.stacking_config.yaml kopiert.
#
# Anpassen und dann nutzen!

# ───────────────────────────────────────────────────────────
# SD-Karten-Erkennung
# ───────────────────────────────────────────────────────────

# Modus: 'ask' (immer fragen), 'first' (erste nehmen), 'manual' (fester Pfad)
sd_card_mode: ask

# Nur für sd_card_mode='manual': Fester Pfad zum DCIM-Ordner
watch_dir: /Volumes/untitled/DCIM

# ───────────────────────────────────────────────────────────
# Output-Einstellungen
# ───────────────────────────────────────────────────────────

output_dir: ~/Pictures/Stacked
temp_dir: /tmp/stacking

# ───────────────────────────────────────────────────────────
# Serien-Erkennung
# ───────────────────────────────────────────────────────────

# Max. Sekunden zwischen Bildern einer Serie
time_threshold: 30

# Mindestanzahl Bilder pro Serie
min_images: 3

# ───────────────────────────────────────────────────────────
# GPS-Tagging (optional)
# ───────────────────────────────────────────────────────────

# Pfad zu GPX-Track-File (leer lassen wenn nicht benötigt)
gpx_file: ""

# ───────────────────────────────────────────────────────────
# Stacking-Software
# ───────────────────────────────────────────────────────────

stacker: focus-stack
stacker_binary: ~/bin/focus-stack/focus-stack.app/Contents/MacOS/focus-stack

# ───────────────────────────────────────────────────────────
# focus-stack Parameter
# ───────────────────────────────────────────────────────────

consistency: 3      # 2-5, höher = strenger
denoise: 0.5        # 0-2, Rauschunterdrückung

save_steps: false

# ───────────────────────────────────────────────────────────
# RAW-Konvertierung
# ───────────────────────────────────────────────────────────

convert_raw: true
raw_converter: libraw

# ───────────────────────────────────────────────────────────
# Debug-Optionen
# ───────────────────────────────────────────────────────────

debug: false
keep_temp: false

# ───────────────────────────────────────────────────────────
# Output-Format
# ───────────────────────────────────────────────────────────

output_format: jpg
output_quality: 95
