# ═══════════════════════════════════════════════════════════
# OM-1 Macro Stacking Pipeline Configuration
# ═══════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────
# SD Card Settings
# ─────────────────────────────────────────────────────────
# Mode: 'ask' (interactive), 'first' (auto-select), 'manual' (fixed path)
sd_card_mode: ask

# Only used when sd_card_mode='manual'
watch_dir: /Volumes/SD-CARD/DCIM

# ─────────────────────────────────────────────────────────
# Output Settings
# ─────────────────────────────────────────────────────────
output_dir: ~/Pictures/Stacked
temp_dir: /tmp/stacking

# Output format: 'jpg' or 'tiff'
output_format: jpg

# JPEG quality (1-100, higher = better quality)
output_quality: 95

# ─────────────────────────────────────────────────────────
# Series Detection
# ─────────────────────────────────────────────────────────
# Maximum seconds between images to be considered same series
time_threshold: 30

# Minimum number of images required to form a series
min_images: 3

# ─────────────────────────────────────────────────────────
# Helicon Focus Settings
# ─────────────────────────────────────────────────────────
# Path to Helicon Focus binary
helicon_binary: /Applications/HeliconFocus.app/Contents/MacOS/HeliconFocus

# Stacking method:
#   A = Weighted Average (fast, soft)
#   B = Depth Map (medium, good for 3D)
#   C = Pyramid (slow, best quality) ← RECOMMENDED
helicon_method: C

# Radius parameter (4-20, default: 8)
# Higher = more aggressive alignment, may introduce artifacts
helicon_radius: 8

# Smoothing parameter (0-10, default: 4)
# Higher = smoother transitions between focus zones
helicon_smoothing: 4

# Save depth map alongside result?
helicon_save_depthmap: false

# ─────────────────────────────────────────────────────────
# Image Processing
# ─────────────────────────────────────────────────────────
# JPEG quality when converting RAW (1-100)
jpg_quality: 95

# RAW to JPG converter: 'imagemagick' or 'dcraw'
# imagemagick is faster and recommended
jpg_converter: imagemagick

# ─────────────────────────────────────────────────────────
# Performance & Debug
# ─────────────────────────────────────────────────────────
# Keep temporary files after processing?
# (Useful for debugging, but uses disk space)
keep_temp: false

# Verbose logging?
verbose: false

# Debug mode (very verbose)?
debug: false

# Dry run mode (detect series but don't process)?
dry_run: false

# ─────────────────────────────────────────────────────────
# Advanced Options
# ─────────────────────────────────────────────────────────
# Optional: GPS track file for geotagging
gpx_file: ""

# Optional: Custom artist name for EXIF metadata
artist: "Oliver Kuemmel"
