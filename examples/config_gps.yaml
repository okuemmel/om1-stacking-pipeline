# Mit GPS-Tagging (für Außenaufnahmen)

sd_card_mode: first
time_threshold: 60  # Längere Pausen zwischen Serien
min_images: 3

# GPS-Track einbinden
gpx_file: ~/Downloads/track.gpx

stacker: focus-stack
stacker_binary: ~/bin/focus-stack/focus-stack.app/Contents/MacOS/focus-stack

consistency: 3
denoise: 0.5

convert_raw: true
raw_converter: libraw

output_dir: ~/Pictures/Stacked
output_format: jpg
output_quality: 95

